properties:
  template:
    containers:
    - name: chatwoot-fresh
      image: chatwootregistry95290.azurecr.io/chatwoot-full:v6-final
      env:
      - name: DATABASE_URL
        value: "postgresql://chatwootuser:P@ssword456!@chatwoot-db-fresh.postgres.database.azure.com/chatwoot"
      - name: REDIS_URL
        value: "redis://localhost:6379"
      - name: RAILS_ENV
        value: "production"
      - name: SECRET_KEY_BASE
        value: "your-secret-key-base-replace-this-in-production-12345678901234567890123456789012345678901234567890123456789012345678901234567890"
      - name: FRONTEND_URL
        value: "https://voicelinkai.com"
      - name: ACTIVE_STORAGE_SERVICE
        value: "local"
      resources:
        cpu: 1.0
        memory: "2Gi"
    - name: redis
      image: redis:7-alpine
      command:
      - "redis-server"
      - "--appendonly"
      - "yes"
      - "--maxmemory"
      - "256mb"
      - "--maxmemory-policy"
      - "allkeys-lru"
      resources:
        cpu: 0.25
        memory: "0.5Gi" 