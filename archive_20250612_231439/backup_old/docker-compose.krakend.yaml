version: '3.8'

services:
  krakend-gateway:
    image: devopsfaith/krakend:2.4.1
    container_name: chatwoot-security-gateway
    ports:
      - "8080:8080"     # Gateway API port
      - "8090:8090"     # Metrics port
    volumes:
      - ./krakend.json:/etc/krakend/krakend.json
    environment:
      - KRAKEND_PORT=8080
      - FC_ENABLE=1
      - FC_SETTINGS=/etc/krakend
      - FC_PARTIALS=/etc/krakend/partials
    command: ["run", "-c", "/etc/krakend/krakend.json"]
    restart: unless-stopped
    networks:
      - chatwoot-security
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/__health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: Redis for KrakenD caching and rate limiting
  krakend-redis:
    image: redis:7-alpine
    container_name: krakend-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - krakend_redis_data:/data
    ports:
      - "6380:6379"  # Different port to avoid conflicts
    networks:
      - chatwoot-security
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Optional: Prometheus metrics collector
  prometheus:
    image: prom/prometheus:latest
    container_name: krakend-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - chatwoot-security

volumes:
  krakend_redis_data:
    driver: local
  prometheus_data:
    driver: local

networks:
  chatwoot-security:
    driver: bridge 