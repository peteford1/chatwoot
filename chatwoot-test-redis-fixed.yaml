location: eastus
resourceGroup: SM-Test
properties:
  environmentId: /subscriptions/535e2aa8-27e9-4d89-9208-be446ef89b87/resourceGroups/SM-Test/providers/Microsoft.App/managedEnvironments/chatwoot-env-test
  configuration:
    ingress:
      external: true
      targetPort: 3000
      traffic:
      - weight: 100
        latestRevision: true
  template:
    containers:
    - name: chatwoot-backend
      image: chatwoot/chatwoot:latest
      command:
      - /bin/sh
      args:
      - -c
      - bundle exec rails db:prepare && bundle exec rails server -b 0.0.0.0 -p 3000
      env:
      - name: RAILS_ENV
        value: test
      - name: CW_API_ONLY_SERVER
        value: "true"
      - name: DATABASE_URL
        value: postgresql://chatwootuser:ChatwootSecure2025!@chatwoot-db-fresh.postgres.database.azure.com:5432/chatwoot_shared?options=-csearch_path%3Dtest
      - name: DATABASE_SCHEMA
        value: test
      - name: REDIS_URL
        value: redis://localhost:6379
      - name: SECRET_KEY_BASE
        value: bb02bd4083fc907af6a7857e937af9067e1c68fde8995e90186545bb34e945f1
      - name: FRONTEND_URL
        value: https://chatwoot-test.calmmushroom-30b1c815.eastus.azurecontainerapps.io
      - name: FORCE_SSL
        value: "false"
      - name: RAILS_LOG_TO_STDOUT
        value: "true"
      - name: ENABLE_ACCOUNT_SIGNUP
        value: "false"
      - name: SKIP_DATABASE_CREATION
        value: "true"
      - name: SIDEKIQ_CONCURRENCY
        value: "2"
      resources:
        cpu: 0.6
        memory: 1.2Gi
    - name: chatwoot-sidekiq
      image: chatwoot/chatwoot:latest
      command:
      - /bin/sh
      args:
      - -c
      - bundle exec sidekiq -C config/sidekiq.yml
      env:
      - name: RAILS_ENV
        value: test
      - name: DATABASE_URL
        value: postgresql://chatwootuser:ChatwootSecure2025!@chatwoot-db-fresh.postgres.database.azure.com:5432/chatwoot_shared?options=-csearch_path%3Dtest
      - name: REDIS_URL
        value: redis://localhost:6379
      - name: SECRET_KEY_BASE
        value: bb02bd4083fc907af6a7857e937af9067e1c68fde8995e90186545bb34e945f1
      - name: RAILS_LOG_TO_STDOUT
        value: "true"
      - name: SIDEKIQ_CONCURRENCY
        value: "2"
      resources:
        cpu: 0.25
        memory: 0.5Gi
    - name: redis
      image: redis:7-alpine
      command:
      - redis-server
      - --appendonly
      - "yes"
      - --maxmemory
      - 128mb
      - --maxmemory-policy
      - allkeys-lru
      resources:
        cpu: 0.25
        memory: 0.5Gi
    scale:
      minReplicas: 0
      maxReplicas: 1 