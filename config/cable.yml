default: &default
  adapter: redis
  url: <%= ENV.fetch('REDIS_URL', 'redis://127.0.0.1:6379') %>
  # 2025-01-27: Commented out to avoid sending nil/empty password to Redis, which causes ERR AUTH error when no password is set on server. See https://github.com/redis/redis-rb/issues/931
  # password: <%= ENV.fetch('REDIS_PASSWORD', nil).presence %>
  ssl_params: 
    verify_mode: <%= Chatwoot.redis_ssl_verify_mode %>
  channel_prefix: <%= "chatwoot_#{Rails.env}_action_cable"  %>

development:
  <<: *default

test:
  adapter: test
  channel_prefix: <%= "chatwoot_#{Rails.env}_action_cable"  %>

staging:
  <<: *default

production:
  <<: *default
