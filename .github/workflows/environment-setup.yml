name: Environment Setup and Seeding

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'development'
        type: choice
        options:
        - development
        - test
        - staging
        - production
      action:
        description: 'Action to perform'
        required: true
        default: 'setup'
        type: choice
        options:
        - setup
        - migrate
        - seed
        - reset
        - status

env:
  AZURE_CONTAINER_REGISTRY: chatwootregistry95290.azurecr.io
  RESOURCE_GROUP: SM-Test

jobs:
  load-config:
    runs-on: ubuntu-latest
    outputs:
      database_name: ${{ steps.load.outputs.database_name }}
      database_schema: ${{ steps.load.outputs.database_schema }}
      container_app_name: ${{ steps.load.outputs.container_app_name }}
      rails_env: ${{ steps.load.outputs.rails_env }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Load Environment Configuration
        id: load
        run: |
          ENV_NAME="${{ github.event.inputs.environment }}"
          
          # Load from environments.yml
          case $ENV_NAME in
            "development")
              echo "database_name=chatwoot_shared" >> $GITHUB_OUTPUT
              echo "database_schema=development" >> $GITHUB_OUTPUT
              echo "container_app_name=chatwoot-backend-dev" >> $GITHUB_OUTPUT
              echo "rails_env=development" >> $GITHUB_OUTPUT
              ;;
            "test")
              echo "database_name=chatwoot_shared" >> $GITHUB_OUTPUT
              echo "database_schema=test" >> $GITHUB_OUTPUT
              echo "container_app_name=chatwoot-backend-test" >> $GITHUB_OUTPUT
              echo "rails_env=test" >> $GITHUB_OUTPUT
              ;;
            "staging")
              echo "database_name=chatwoot_shared" >> $GITHUB_OUTPUT
              echo "database_schema=staging" >> $GITHUB_OUTPUT
              echo "container_app_name=chatwoot-backend-staging" >> $GITHUB_OUTPUT
              echo "rails_env=staging" >> $GITHUB_OUTPUT
              ;;
            "production")
              echo "database_name=chatwoot_production" >> $GITHUB_OUTPUT
              echo "database_schema=public" >> $GITHUB_OUTPUT
              echo "container_app_name=chatwoot-backend-prod" >> $GITHUB_OUTPUT
              echo "rails_env=production" >> $GITHUB_OUTPUT
              ;;
          esac

  setup-environment:
    runs-on: ubuntu-latest
    needs: load-config
    if: github.event.inputs.action != 'status'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Update Container Environment
        run: |
          echo "Updating container environment for ${{ github.event.inputs.environment }}"
          
          # Build database URL - use admin credentials for all environments
          DATABASE_URL="postgresql://${{ secrets.DB_USERNAME }}:${{ secrets.DB_PASSWORD }}@${{ secrets.DB_HOST }}:5432/${{ needs.load-config.outputs.database_name }}"
          if [[ "${{ github.event.inputs.environment }}" != "production" ]]; then
            DATABASE_URL="${DATABASE_URL}?options=-csearch_path%3D${{ needs.load-config.outputs.database_schema }}"
          fi
          
          echo "Database URL configured for ${{ needs.load-config.outputs.database_schema }} schema"
          
          # Try multiple approaches to update the container
          echo "Attempting container update with replace-env-vars..."
          
          # Method 1: Use replace-env-vars to completely replace environment
          az containerapp update \
            --name ${{ needs.load-config.outputs.container_app_name }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --replace-env-vars \
              RAILS_ENV=${{ needs.load-config.outputs.rails_env }} \
              DATABASE_URL="$DATABASE_URL" \
              REDIS_URL="${{ secrets.REDIS_URL }}" \
              SECRET_KEY_BASE="${{ secrets.SECRET_KEY_BASE }}" \
              FRONTEND_URL="https://${{ needs.load-config.outputs.container_app_name }}.calmmushroom-30b1c815.eastus.azurecontainerapps.io" \
              FORCE_SSL="false" \
              RAILS_LOG_TO_STDOUT="true" \
              CW_API_ONLY_SERVER="true" \
              ENABLE_ACCOUNT_SIGNUP="false" \
              SKIP_DATABASE_CREATION="true" \
              SIDEKIQ_CONCURRENCY="5" || echo "Replace method failed, trying alternative..."
          
          # Method 2: If replace fails, try individual updates
          if [[ $? -ne 0 ]]; then
            echo "Trying individual environment variable updates..."
            az containerapp update \
              --name ${{ needs.load-config.outputs.container_app_name }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --set-env-vars RAILS_ENV=${{ needs.load-config.outputs.rails_env }}
            
            az containerapp update \
              --name ${{ needs.load-config.outputs.container_app_name }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --set-env-vars DATABASE_URL="$DATABASE_URL"
          fi

      - name: Wait for Container Update
        run: |
          echo "Waiting for container to restart and apply new configuration..."
          
          # Wait for revision to be created
          echo "Checking for new revision..."
          for i in {1..12}; do
            REVISION_COUNT=$(az containerapp revision list --name ${{ needs.load-config.outputs.container_app_name }} --resource-group ${{ env.RESOURCE_GROUP }} --query 'length(@)')
            echo "Attempt $i: Found $REVISION_COUNT revisions"
            if [[ $REVISION_COUNT -gt 1 ]]; then
              echo "New revision detected!"
              break
            fi
            sleep 10
          done
          
          # Wait for container to be ready
          echo "Waiting for container to be ready..."
          for i in {1..18}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://${{ needs.load-config.outputs.container_app_name }}.calmmushroom-30b1c815.eastus.azurecontainerapps.io" || echo "000")
            echo "Attempt $i: HTTP Status $STATUS"
            if [[ "$STATUS" == "200" ]]; then
              echo "Container is ready!"
              break
            fi
            sleep 10
          done

      - name: Run Database Operations
        run: |
          echo "Running database operations for ${{ github.event.inputs.action }}"
          
          BASE_URL="https://${{ needs.load-config.outputs.container_app_name }}.calmmushroom-30b1c815.eastus.azurecontainerapps.io"
          
          # Verify environment is properly configured
          echo "Verifying container environment..."
          HEALTH_CHECK=$(curl -s "$BASE_URL" || echo "failed")
          echo "Health check response: $HEALTH_CHECK"
          
          # Check if Platform API is available
          PLATFORM_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$BASE_URL/platform/api/v1/accounts" || echo "000")
          echo "Platform API status: $PLATFORM_STATUS"
          
          if [[ "$PLATFORM_STATUS" == "401" || "$PLATFORM_STATUS" == "200" ]]; then
            echo "✅ Platform API is available - proceeding with API-based seeding"
            
            # Create Platform App via API
            echo "Creating Platform App via API..."
            PLATFORM_RESPONSE=$(curl -s -X POST "$BASE_URL/platform/api/v1/platform_apps" \
              -H "Content-Type: application/json" \
              -d '{"name": "VoiceLinkAI ${{ github.event.inputs.environment }}"}' || echo "failed")
            echo "Platform App creation response: $PLATFORM_RESPONSE"
            
            # Create Account via Platform API
            echo "Creating Account via Platform API..."
            ACCOUNT_RESPONSE=$(curl -s -X POST "$BASE_URL/platform/api/v1/accounts" \
              -H "Content-Type: application/json" \
              -d '{"name": "voicelinkai-${{ github.event.inputs.environment }}", "locale": "en"}' || echo "failed")
            echo "Account creation response: $ACCOUNT_RESPONSE"
            
          else
            echo "❌ Platform API not available (Status: $PLATFORM_STATUS)"
            echo "This might indicate the container environment wasn't updated properly"
            echo "Container might still be in production mode"
            
            # Try container exec as fallback
            echo "Attempting container exec as fallback..."
            az containerapp exec \
              --name ${{ needs.load-config.outputs.container_app_name }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --command "/bin/bash" \
              --args "-c 'cd /app && echo \"Rails.env: \#{Rails.env}\" && bundle exec rails runner \"puts Rails.env\"'" || echo "Container exec failed"
          fi
          
          echo "Database operations completed"

  verify-setup:
    runs-on: ubuntu-latest
    needs: [load-config, setup-environment]
    if: always()
    steps:
      - name: Verify Environment
        run: |
          echo "=== Environment Verification ==="
          echo "Environment: ${{ github.event.inputs.environment }}"
          echo "Container: ${{ needs.load-config.outputs.container_app_name }}"
          
          BASE_URL="https://${{ needs.load-config.outputs.container_app_name }}.calmmushroom-30b1c815.eastus.azurecontainerapps.io"
          
          # Test accessibility
          if curl -s "$BASE_URL" > /dev/null; then
            echo "✅ Environment accessible: $BASE_URL"
          else
            echo "❌ Environment not accessible"
          fi
          
          # Test API endpoints
          PLATFORM_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$BASE_URL/platform/api/v1/accounts")
          echo "Platform API Status: $PLATFORM_STATUS"
          
          APP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$BASE_URL/api/v1/profile")
          echo "Application API Status: $APP_STATUS" 