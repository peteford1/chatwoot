name: Deploy Chatwoot with Redis Sidecar

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'test'
        type: choice
        options:
          - development
          - test
          - staging
          - production
      container_name:
        description: 'Container app name'
        required: true
        default: 'chatwoot-with-redis'
      account_name:
        description: 'Initial account name'
        required: false
        default: 'VoiceLink AI'
      admin_email:
        description: 'Admin user email'
        required: false
        default: 'admin@voicelinkai.com'

env:
  AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
  RESOURCE_GROUP: SM-Test
  LOCATION: eastus
  CONTAINER_ENV: chatwoot-env-test

jobs:
  prepare-database:
    runs-on: ubuntu-latest
    name: Prepare Database
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.2'
        bundler-cache: true

    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Install PostgreSQL client
      run: |
        sudo apt-get update
        sudo apt-get install -y postgresql-client

    - name: Test Database Connection
      run: |
        PGPASSWORD="${{ secrets.DB_PASSWORD }}" psql \
          -h ${{ secrets.DB_HOST }} \
          -U ${{ secrets.DB_USERNAME }} \
          -d chatwoot_shared \
          -c "SELECT current_database(), current_user;"

    - name: Check if database is already prepared
      id: check_db
      run: |
        TABLE_COUNT=$(PGPASSWORD="${{ secrets.DB_PASSWORD }}" psql \
          -h ${{ secrets.DB_HOST }} \
          -U ${{ secrets.DB_USERNAME }} \
          -d chatwoot_shared \
          -t -c "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema = 'public';")
        echo "table_count=$TABLE_COUNT" >> $GITHUB_OUTPUT
        echo "Database has $TABLE_COUNT tables"

    - name: Prepare Chatwoot Database
      if: steps.check_db.outputs.table_count < 50
      env:
        RAILS_ENV: production
        SECRET_KEY_BASE: ${{ secrets.SECRET_KEY_BASE }}
        POSTGRES_HOST: ${{ secrets.DB_HOST }}
        POSTGRES_USERNAME: ${{ secrets.DB_USERNAME }}
        POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
        POSTGRES_DATABASE: chatwoot_shared
        POSTGRES_PORT: 5432
      run: |
        echo "Database needs preparation (only ${{ steps.check_db.outputs.table_count }} tables found)"
        bundle exec rails db:chatwoot_prepare

  deploy-with-redis:
    runs-on: ubuntu-latest
    needs: prepare-database
    name: Deploy Container with Redis Sidecar
    
    steps:
    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Set environment-specific configuration
      id: env_config
      run: |
        case "${{ github.event.inputs.environment }}" in
          "production")
            echo "rails_env=production" >> $GITHUB_OUTPUT
            echo "database_schema=public" >> $GITHUB_OUTPUT
            echo "database_name=chatwoot_production" >> $GITHUB_OUTPUT
            echo "min_replicas=1" >> $GITHUB_OUTPUT
            echo "max_replicas=3" >> $GITHUB_OUTPUT
            echo "cpu_backend=1.0" >> $GITHUB_OUTPUT
            echo "memory_backend=2.0Gi" >> $GITHUB_OUTPUT
            echo "redis_memory=256mb" >> $GITHUB_OUTPUT
            echo "sidekiq_concurrency=10" >> $GITHUB_OUTPUT
            ;;
          "staging")
            echo "rails_env=staging" >> $GITHUB_OUTPUT
            echo "database_schema=staging" >> $GITHUB_OUTPUT
            echo "database_name=chatwoot_shared" >> $GITHUB_OUTPUT
            echo "min_replicas=0" >> $GITHUB_OUTPUT
            echo "max_replicas=2" >> $GITHUB_OUTPUT
            echo "cpu_backend=0.75" >> $GITHUB_OUTPUT
            echo "memory_backend=1.5Gi" >> $GITHUB_OUTPUT
            echo "redis_memory=128mb" >> $GITHUB_OUTPUT
            echo "sidekiq_concurrency=5" >> $GITHUB_OUTPUT
            ;;
          *)
            # development and test
            echo "rails_env=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
            echo "database_schema=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
            echo "database_name=chatwoot_shared" >> $GITHUB_OUTPUT
            echo "min_replicas=0" >> $GITHUB_OUTPUT
            echo "max_replicas=1" >> $GITHUB_OUTPUT
            echo "cpu_backend=0.6" >> $GITHUB_OUTPUT
            echo "memory_backend=1.2Gi" >> $GITHUB_OUTPUT
            echo "redis_memory=64mb" >> $GITHUB_OUTPUT
            echo "sidekiq_concurrency=2" >> $GITHUB_OUTPUT
            ;;
        esac

    - name: Delete existing container if exists
      continue-on-error: true
      run: |
        az containerapp delete \
          --name ${{ github.event.inputs.container_name }} \
          --resource-group ${{ env.RESOURCE_GROUP }} \
          --yes

    - name: Create Redis-enabled Container App
      run: |
        # Create container app with Redis sidecar
        az containerapp create \
          --name ${{ github.event.inputs.container_name }} \
          --resource-group ${{ env.RESOURCE_GROUP }} \
          --environment ${{ env.CONTAINER_ENV }} \
          --yaml /dev/stdin <<EOF
        location: ${{ env.LOCATION }}
        resourceGroup: ${{ env.RESOURCE_GROUP }}
        properties:
          environmentId: /subscriptions/${{ secrets.AZURE_SUBSCRIPTION_ID }}/resourceGroups/${{ env.RESOURCE_GROUP }}/providers/Microsoft.App/managedEnvironments/${{ env.CONTAINER_ENV }}
          configuration:
            ingress:
              external: true
              targetPort: 3000
              traffic:
              - weight: 100
                latestRevision: true
          template:
            containers:
            - name: chatwoot-backend
              image: chatwoot/chatwoot:latest
              command:
              - /bin/sh
              args:
              - -c
              - bundle exec rails db:prepare && bundle exec rails server -b 0.0.0.0 -p 3000
              env:
              - name: RAILS_ENV
                value: ${{ steps.env_config.outputs.rails_env }}
              - name: CW_API_ONLY_SERVER
                value: "true"
              - name: DATABASE_URL
                value: postgresql://${{ secrets.DB_USERNAME }}:${{ secrets.DB_PASSWORD }}@${{ secrets.DB_HOST }}:5432/${{ steps.env_config.outputs.database_name }}?options=-csearch_path%3D${{ steps.env_config.outputs.database_schema }}
              - name: DATABASE_SCHEMA
                value: ${{ steps.env_config.outputs.database_schema }}
              - name: REDIS_URL
                value: redis://localhost:6379
              - name: SECRET_KEY_BASE
                value: ${{ secrets.SECRET_KEY_BASE }}
              - name: FRONTEND_URL
                value: https://${{ github.event.inputs.container_name }}.calmmushroom-30b1c815.eastus.azurecontainerapps.io
              - name: FORCE_SSL
                value: "false"
              - name: RAILS_LOG_TO_STDOUT
                value: "true"
              - name: ENABLE_ACCOUNT_SIGNUP
                value: "false"
              - name: SKIP_DATABASE_CREATION
                value: "true"
              - name: SIDEKIQ_CONCURRENCY
                value: ${{ steps.env_config.outputs.sidekiq_concurrency }}
              resources:
                cpu: ${{ steps.env_config.outputs.cpu_backend }}
                memory: ${{ steps.env_config.outputs.memory_backend }}
            - name: chatwoot-sidekiq
              image: chatwoot/chatwoot:latest
              command:
              - /bin/sh
              args:
              - -c
              - bundle exec sidekiq -C config/sidekiq.yml
              env:
              - name: RAILS_ENV
                value: ${{ steps.env_config.outputs.rails_env }}
              - name: DATABASE_URL
                value: postgresql://${{ secrets.DB_USERNAME }}:${{ secrets.DB_PASSWORD }}@${{ secrets.DB_HOST }}:5432/${{ steps.env_config.outputs.database_name }}?options=-csearch_path%3D${{ steps.env_config.outputs.database_schema }}
              - name: REDIS_URL
                value: redis://localhost:6379
              - name: SECRET_KEY_BASE
                value: ${{ secrets.SECRET_KEY_BASE }}
              - name: RAILS_LOG_TO_STDOUT
                value: "true"
              - name: SIDEKIQ_CONCURRENCY
                value: ${{ steps.env_config.outputs.sidekiq_concurrency }}
              resources:
                cpu: 0.25
                memory: 0.5Gi
            - name: redis
              image: redis:7-alpine
              command:
              - redis-server
              - --appendonly
              - "yes"
              - --maxmemory
              - ${{ steps.env_config.outputs.redis_memory }}
              - --maxmemory-policy
              - allkeys-lru
              resources:
                cpu: 0.25
                memory: 0.5Gi
            scale:
              minReplicas: ${{ steps.env_config.outputs.min_replicas }}
              maxReplicas: ${{ steps.env_config.outputs.max_replicas }}
        EOF

    - name: Wait for deployment
      run: |
        echo "Waiting for container to be ready..."
        sleep 60
        
        # Check container status
        STATUS=$(az containerapp show \
          --name ${{ github.event.inputs.container_name }} \
          --resource-group ${{ env.RESOURCE_GROUP }} \
          --query "properties.runningStatus" -o tsv)
        
        echo "Container status: $STATUS"
        
        if [ "$STATUS" != "Running" ]; then
          echo "Container failed to start. Checking logs..."
          az containerapp logs show \
            --name ${{ github.event.inputs.container_name }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --tail 50
          exit 1
        fi

    - name: Verify deployment
      run: |
        # Get the application URL
        APP_URL=$(az containerapp show \
          --name ${{ github.event.inputs.container_name }} \
          --resource-group ${{ env.RESOURCE_GROUP }} \
          --query "properties.configuration.ingress.fqdn" -o tsv)
        
        echo "Application URL: https://$APP_URL"
        
        # Test health endpoint
        echo "Testing health endpoint..."
        sleep 30  # Additional wait for full startup
        
        curl -f "https://$APP_URL/health" || {
          echo "Health check failed. Checking logs..."
          az containerapp logs show \
            --name ${{ github.event.inputs.container_name }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --tail 100
          exit 1
        }
        
        echo "✅ Deployment successful!"
        echo "🌐 Access your Chatwoot instance at: https://$APP_URL"
        echo "🗄️ Database: ${{ steps.env_config.outputs.database_name }}"
        echo "📋 Schema: ${{ steps.env_config.outputs.database_schema }}"
        echo "🔧 Environment: ${{ github.event.inputs.environment }}"

    - name: Show deployment summary
      run: |
        APP_URL=$(az containerapp show \
          --name ${{ github.event.inputs.container_name }} \
          --resource-group ${{ env.RESOURCE_GROUP }} \
          --query "properties.configuration.ingress.fqdn" -o tsv)
        
        echo "🚀 Chatwoot with Redis Deployment Complete!"
        echo "=================================="
        echo "📍 Container: ${{ github.event.inputs.container_name }}"
        echo "🌐 URL: https://$APP_URL"
        echo "🎯 Environment: ${{ github.event.inputs.environment }}"
        echo "🗄️ Database: ${{ steps.env_config.outputs.database_name }}"
        echo "📋 Schema: ${{ steps.env_config.outputs.database_schema }}"
        echo "⚖️ Replicas: ${{ steps.env_config.outputs.min_replicas }}-${{ steps.env_config.outputs.max_replicas }}"
        echo ""
        echo "🔧 Container Components:"
        echo "   • Chatwoot Backend (Rails API)"
        echo "   • Sidekiq Worker (Background jobs)"
        echo "   • Redis Cache (Session & job storage)"
        echo ""
        echo "🔍 Test endpoints:"
        echo "   Health: https://$APP_URL/health"
        echo "   API: https://$APP_URL/api/v1/accounts" 